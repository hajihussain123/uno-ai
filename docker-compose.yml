version: '3.8'

services:
  client:
    build:
      context: ./client
      dockerfile: ../docker/Dockerfile.client
    container_name: uno-ai-client
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - server
    networks:
      - uno-network

  server:
    build:
      context: ./server
      dockerfile: ../docker/Dockerfile.server
    container_name: uno-ai-server
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - CLIENT_URL=http://localhost:5173
      - NODE_ENV=production
    networks:
      - uno-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  uno-network:
    driver: bridge
